name: Talkie
options:
  bundleIdPrefix: com.archiev
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
packages:
  HotKey:
    url: https://github.com/soffes/HotKey
    from: 0.2.0
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio
    from: 0.15.2
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0
settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    # Both targets must sign with the same team or the test bundle fails dlopen
    # ("different Team IDs"). Release overrides with the Developer ID team.
    DEVELOPMENT_TEAM: EB2QMSLYN4
targets:
  Talkie:
    type: application
    platform: macOS
    sources: [Talkie]
    info:
      path: Talkie/Info.plist
      properties:
        CFBundleDisplayName: Talkie
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        LSUIElement: true
        NSPrincipalClass: NSApplication
        NSMicrophoneUsageDescription: "Talkie listens while you hold the dictation key so it can transcribe your speech."
        SUFeedURL: "https://updates.example.com/talkie/appcast.xml"  # ⚠️ HUMAN: real feed host (Human inputs #5)
        SUPublicEDKey: "PASTE-GENERATE-KEYS-PUBLIC-KEY-HERE"          # ⚠️ HUMAN: from generate_keys (Human inputs #4)
        SUEnableInstallerLauncherService: true  # routes installs through Sparkle's bundled XPC service; required if sandboxing ever lands, harmless without it
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.archiev.talkie
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: Talkie/Talkie.entitlements
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Developer ID Application"
          DEVELOPMENT_TEAM: YOURTEAMID  # ⚠️ HUMAN: real Team ID (Human inputs #1)
    dependencies:
      - package: HotKey
      - package: FluidAudio
      - package: Sparkle
  TalkieTests:
    type: bundle.unit-test
    platform: macOS
    sources: [TalkieTests]
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES  # test bundle needs an Info.plist or signing fails
    dependencies:
      - target: Talkie
schemes:
  Talkie:
    build:
      targets:
        Talkie: all
    run:
      config: Debug
    test:
      config: Debug
      targets: [TalkieTests]
